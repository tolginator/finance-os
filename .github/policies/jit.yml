# Just-In-Time (JIT) Access Policy

id: id
name: JIT_Access
description: Policy for admin JIT for repos

resource: repository

configuration:
  jitAccess:
    enabled: true
    autoApprove:
      roles:
        - admin
        - maintain
      maxDuration: 2h
      requireReason: true
      notifyOnApproval: true
    manualReview:
      roles:
        - push
        - pull
      approvers:
        - tolginator
      maxDuration: 4h
      requireReason: true
    audit:
      logAllRequests: true
      logApprovals: true
      logDenials: true
      retentionDays: 90
