# Automatically add new issues and PRs to the finance-os GitHub Project

name: Add to Project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/tolginator/projects/2
          github-token: ${{ secrets.PROJECT_TOKEN }}
