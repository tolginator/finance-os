# CI/CD workflow for finance-os

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mcp-server:
    name: MCP Server – Unit (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint

  mcp-server-integration:
    name: MCP Server – Integration (TypeScript)
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration

  agents:
    name: Agents – Unit (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pytest -m "not integration"

  agents-integration:
    name: Agents – Integration (Python)
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Verify Azure auth
        run: az account show --query "{subscription: name, user: user.name}" -o table
      - name: Run integration tests
        env:
          FINANCE_OS_LLM_PROVIDER: azure_openai
          FINANCE_OS_AZURE__ENDPOINT: https://tolginator.openai.azure.com/
          FINANCE_OS_AZURE__DEPLOYMENT: gpt-4.1-mini
          FINANCE_OS_AZURE__API_VERSION: '2024-10-21'
        run: pytest -m integration
